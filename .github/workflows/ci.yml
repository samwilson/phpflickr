name: CI

on: [push, pull_request]

jobs:
  build:

    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        # All supported PHP versions https://www.php.net/supported-versions.php
        php: [ '7.2', '7.3', '7.4' ]

    runs-on: ${{matrix.os}}

    steps:
    - name: Checkout
      uses: actions/checkout@v1

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{matrix.php}}
        extensions: fileinfo, json, pdo, mbstring

    - name: Install
      run: |
        echo '<?php $apiKey = "'${{ secrets.FLICKR_API_KEY }}'"; \$apiSecret = '${{ secrets.FLICKR_API_SECRET }}'; \$accessToken = '${{ secrets.FLICKR_ACCESS_TOKEN }}'; \$accessTokenSecret = '${{ secrets.FLICKR_ACCESS_SECRET }}';" > tests/config.php;
        composer install

    - name: Test
      run: |
        composer test
